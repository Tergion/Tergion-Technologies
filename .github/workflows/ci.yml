name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_SITE_NAME: Tergion Technologies
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      GHL_PRIVATE_INTEGRATION_TOKEN: ""
      GHL_API_KEY: ""
      GHL_LOCATION_ID: ""
      GHL_SOURCE: Tergion website lead form
      GHL_LEAD_TAGS: website-lead
      NEXTJS_ENV: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and route tests
        run: npm run test

      - name: Next build
        run: npm run build

      - name: Cloudflare build
        run: npm run cf:build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        run: npm run test:e2e

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: verify
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    environment: production
    concurrency:
      group: production-worker
      cancel-in-progress: false
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://tergion.com' }}
      NEXT_PUBLIC_SITE_NAME: ${{ vars.NEXT_PUBLIC_SITE_NAME || 'Tergion Technologies' }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      NEXTJS_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deploy credentials
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Deploy Worker
        run: npm run cf:deploy
